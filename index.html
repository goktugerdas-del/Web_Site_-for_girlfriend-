<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Berre'ye Özel 🌷</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ffe6e6 0%, #ffb3c6 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #800020;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h1 {
            font-size: 2.5em;
            margin-top: 40px;
            color: #d90429;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }

        .counter {
            font-size: 1.3em;
            margin: 15px 0;
            padding: 15px 30px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(217, 4, 41, 0.15);
            max-width: 90%;
        }

        .counter b {
            color: #d90429;
            font-size: 1.2em;
        }

        .photo-frame {
            width: 85%;
            max-width: 350px;
            margin: 30px auto;
            padding: 15px 15px 5px 15px;
            background: white;
            border: 2px solid #ff8fab;
            border-radius: 5px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            transform: rotate(-3deg);
            transition: transform 0.4s ease;
        }

        .photo-frame:hover {
            transform: rotate(1deg) scale(1.03);
        }

        .photo-frame img {
            width: 100%;
            border-radius: 5px;
            display: block;
            background-color: #ffccd5; /* Fotoğraf yüklenene kadar görünen renk */
            min-height: 250px;
            object-fit: cover;
        }

        .photo-frame p {
            margin: 10px 0;
            font-family: 'Brush Script MT', cursive, sans-serif;
            font-size: 1.5em;
            color: #d90429;
        }

        /* Lale ve Buket Animasyonları */
        .bouquet {
            position: relative;
            height: 200px;
            width: 100%;
            margin-top: auto;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            padding-bottom: 30px;
        }

        .tulip {
            width: 45px;
            height: 60px;
            background: #d90429;
            border-radius: 50% 50% 10px 10px;
            position: relative;
            transform-origin: bottom center;
            opacity: 0;
            animation: bloom 2.5s ease-out forwards;
        }

        .tulip::before, .tulip::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: #ff4d6d;
            border-radius: 50% 50% 10px 10px;
        }

        .tulip::before { left: -12px; transform: rotate(-18deg); }
        .tulip::after { right: -12px; transform: rotate(18deg); }

        .stem {
            position: absolute;
            top: 58px;
            left: 20px;
            width: 6px;
            height: 150px;
            background: #2d6a4f;
            z-index: -1;
            border-radius: 3px;
        }

        .leaf {
            position: absolute;
            width: 25px;
            height: 60px;
            background: #2d6a4f;
            border-radius: 50% 0 50% 0;
            top: 90px;
            left: 25px;
            transform: rotate(30deg);
        }

        .leaf-left {
            left: -10px;
            top: 110px;
            border-radius: 0 50% 0 50%;
            transform: rotate(-30deg);
        }

        /* Lalelerin sırayla açması için gecikmeler */
        .t1 { animation-delay: 0.3s; height: 55px; }
        .t2 { animation-delay: 1.2s; background: #ff4d6d; transform: scale(1.1); margin-bottom: 20px;}
        .t2::before, .t2::after { background: #ff758f; }
        .t3 { animation-delay: 2.1s; height: 60px; }
        .t4 { animation-delay: 0.8s; background: #c1121f; }
        .t5 { animation-delay: 1.7s; background: #ff8fab; height: 50px;}

        @keyframes bloom {
            0% { transform: scale(0) translateY(80px); opacity: 0; }
            60% { opacity: 1; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <h1>Seni Çok Seviyorum Berre ❤️</h1>

    <div class="counter" id="love-timer">
        Zaman hesaplanıyor...
    </div>

    <div class="photo-frame">
        <img src="fotografiniz.jpg" alt="En Güzel Anımız">
        <p>İyi ki varsın...</p>
    </div>

    <div class="bouquet">
        <div class="tulip t1"><div class="stem"></div><div class="leaf"></div></div>
        <div class="tulip t4"><div class="stem"></div><div class="leaf leaf-left"></div></div>
        <div class="tulip t2"><div class="stem"></div><div class="leaf"></div><div class="leaf leaf-left"></div></div>
        <div class="tulip t5"><div class="stem"></div><div class="leaf leaf-left"></div></div>
        <div class="tulip t3"><div class="stem"></div><div class="leaf"></div></div>
    </div>

    <script>
        // Birliktelik başlangıç tarihi
        const startDate = new Date('2025-01-31T00:00:00');

        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / 1000 / 60) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            document.getElementById('love-timer').innerHTML = 
                `Birlikte geçen <b>${days} gün</b>, ${hours} saat, ${minutes} dakika, ${seconds} saniye`;
        }

        setInterval(updateTimer, 1000);
        updateTimer();
    </script>
</body>
</html>
